{% extends 'base.html' %}

{% block title %}Edit Ticket{% endblock %}

{% block content %}

<div class="form-container">

    <h1>Edit Ticket</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Title</label>
            {{ form.title }}
        </div>

        <div class="form-group">
            <label>Description</label>
            {{ form.description }}
        </div>

        <div class="form-group">
            <label>Status</label>
            {{ form.status }}
        </div>

        <button type="submit" class="btn-primary">
            Save Changes
        </button>

    </form>

    <br>

    <a href="{% url 'ticket_detail' ticket.id %}" class="back-link">
        ← Back to Ticket
    </a>

</div>

{% endblock %}
