{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ticket Portal{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="brand">
            <h2>BGL Help Desk</h2>
            <p>Support Ticket Management System</p>
        </div>

        <nav class="sidebar-menu">
            <a href="/">🏠 Dashboard</a>
            <a href="/">🎫 Tickets</a>
            <a href="/create/">➕ Create Ticket</a>
            <a href="/admin/">⚙️ System Admin</a>
        </nav>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <header class="topbar">
            <h2>Welcome to BGL Help Desk</h2>

            <div class="user-area">
                👤 System Admin
            </div>
        </header>

        <section class="content-area">

            {% block content %}
            {% endblock %}

        </section>

    </main>

</div>

</body>
</html>
